name: Android Release

# Tag pushes use `android-v*` so iOS (`v*`) is not triggered on Android-only releases.
# Manual runs accept the same semver body: `vMAJOR.MINOR.PATCH+BUILD`.
on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Same format as git tags: vMAJOR.MINOR.PATCH+BUILD (version name used; Play versionCode from CI run)"
        required: true
        default: "v1.1.19+120"

concurrency:
  group: android-release
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.6"
  JAVA_VERSION: "17"

jobs:
  build-and-deploy:
    name: Build AAB and Upload to Play Internal
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
            /usr/local/lib/android/sdk/cmake /opt/ghc /usr/local/share/boost \
            /usr/share/swift /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/lib/node_modules /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and parse release tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ github.event.inputs.release_tag }}"
          else
            RAW_TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$RAW_TAG" == android-v* ]]; then
              RAW_TAG="${RAW_TAG#android-}"
            fi
          fi
          if [[ ! "$RAW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "Invalid tag format: $RAW_TAG"
            echo "Expected: vMAJOR.MINOR.PATCH+BUILD or git tag android-vMAJOR.MINOR.PATCH+BUILD"
            exit 1
          fi

          TAG_NO_V="${RAW_TAG#v}"
          VERSION_NAME="${TAG_NO_V%%+*}"
          REQUESTED_BUILD_NUMBER="${TAG_NO_V##*+}"
          # Always use a unique CI-driven versionCode to avoid Play Console collisions.
          # GITHUB_RUN_NUMBER is monotonically increasing per repository.
          BUILD_NUMBER="$((GITHUB_RUN_NUMBER + 1000))"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION_NAME build $BUILD_NUMBER (tag requested: $REQUESTED_BUILD_NUMBER)"

      - name: Update pubspec.yaml version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write android/local.properties
        run: |
          FL_SDK="${FLUTTER_ROOT:-$(dirname "$(dirname "$(command -v flutter)")")}"
          echo "flutter.sdk=${FL_SDK}" > android/local.properties
          cat android/local.properties

      - name: Flutter clean and pub get
        run: |
          flutter clean
          flutter pub get

      - name: Validate Android release secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          [[ -n "$ANDROID_KEYSTORE_B64" ]] || { echo "Missing required secret: ANDROID_KEYSTORE_B64"; exit 1; }
          [[ -n "$ANDROID_KEYSTORE_PASSWORD" ]] || { echo "Missing required secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          [[ -n "$ANDROID_KEY_ALIAS" ]] || { echo "Missing required secret: ANDROID_KEY_ALIAS"; exit 1; }
          [[ -n "$ANDROID_KEY_PASSWORD" ]] || { echo "Missing required secret: ANDROID_KEY_PASSWORD"; exit 1; }
          [[ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]] || { echo "Missing required secret: PLAY_SERVICE_ACCOUNT_JSON"; exit 1; }

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
          ls -lh "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build release AAB
        env:
          CI_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Build release APK
        env:
          CI_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload to Google Play Internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cookster.cooksterapp
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
