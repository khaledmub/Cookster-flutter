name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.29.3"
  JAVA_VERSION: "17"

jobs:
  build-and-deploy:
    name: Build AAB and Upload to Play Internal
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and parse release tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$RAW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "Invalid tag format: $RAW_TAG"
            echo "Expected format: vMAJOR.MINOR.PATCH+BUILD (example: v1.0.7+92)"
            exit 1
          fi

          TAG_NO_V="${RAW_TAG#v}"
          VERSION_NAME="${TAG_NO_V%%+*}"
          BUILD_NUMBER="${TAG_NO_V##*+}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION_NAME build $BUILD_NUMBER"

      - name: Update pubspec.yaml version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          rg "^version:" pubspec.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
          ls -lh "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build release AAB
        env:
          CI_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Google Play Internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.cookster.cooksterapp
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
