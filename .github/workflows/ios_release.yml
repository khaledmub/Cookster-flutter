name: iOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.29.3"
  XCODE_VERSION: "16.0"

jobs:
  build-and-upload-testflight:
    name: Build IPA and Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and parse release tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$RAW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "Invalid tag format: $RAW_TAG"
            echo "Expected format: vMAJOR.MINOR.PATCH+BUILD (example: v1.0.7+92)"
            exit 1
          fi

          TAG_NO_V="${RAW_TAG#v}"
          VERSION_NAME="${TAG_NO_V%%+*}"
          BUILD_NUMBER="${TAG_NO_V##*+}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION_NAME build $BUILD_NUMBER"

      - name: Update pubspec.yaml version
        run: |
          sed -i '' "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          rg "^version:" pubspec.yaml

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare signing files
        shell: bash
        run: |
          echo "${{ secrets.IOS_P12_B64 }}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "${{ secrets.APPSTORE_API_KEY_B64 }}" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8"

      - name: Install certificate and provisioning profile
        env:
          KEYCHAIN_PASSWORD: temp_keychain_password
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        shell: bash
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$RUNNER_TEMP/cert.p12" -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain login.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          security find-identity -v -p codesigning build.keychain

      - name: Build iOS IPA
        run: flutter build ipa --release --export-method app-store

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        shell: bash
        run: |
          IPA_PATH="$(ls build/ios/ipa/*.ipa | head -n 1)"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
