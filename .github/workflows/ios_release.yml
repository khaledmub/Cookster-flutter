name: iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag in format vMAJOR.MINOR.PATCH+BUILD"
        required: true
        default: "v1.0.71+117"

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.6"
  XCODE_VERSION: "16.4"

# One macOS job: flutter build + archive + export on the SAME runner.
# Splitting compile/archive across runners breaks Pods (pub-cache symlinks,
# ffmpeg_kit / LocalPods header paths).
jobs:

  build_ipa:
    name: Build, archive & export IPA
    runs-on: macos-15
    timeout-minutes: 90
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and parse release tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW_TAG="${{ github.event.inputs.release_tag }}"
          else
            RAW_TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$RAW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "Invalid tag format: $RAW_TAG"
            exit 1
          fi
          TAG_NO_V="${RAW_TAG#v}"
          VERSION_NAME="${TAG_NO_V%%+*}"
          BUILD_NUMBER="${TAG_NO_V##*+}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version $VERSION_NAME+$BUILD_NUMBER"

      - name: Update pubspec.yaml version
        run: |
          sed -i '' "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify Xcode
        run: xcodebuild -version && xcrun --sdk iphoneos --show-sdk-version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate secrets
        shell: bash
        env:
          APPSTORE_API_KEY_B64: ${{ secrets.APPSTORE_API_KEY_B64 }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          IOS_DISTRIBUTION_CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERT_B64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE_B64 }}
        run: |
          [ -n "$APPSTORE_API_KEY_B64" ]          || { echo "Missing: APPSTORE_API_KEY_B64"; exit 1; }
          [ -n "$APPSTORE_API_KEY_ID" ]            || { echo "Missing: APPSTORE_API_KEY_ID"; exit 1; }
          [ -n "$APPSTORE_API_ISSUER_ID" ]         || { echo "Missing: APPSTORE_API_ISSUER_ID"; exit 1; }
          [ -n "$IOS_DISTRIBUTION_CERT_B64" ]      || { echo "Missing: IOS_DISTRIBUTION_CERT_B64"; exit 1; }
          [ -n "$IOS_DISTRIBUTION_CERT_PASSWORD" ] || { echo "Missing: IOS_DISTRIBUTION_CERT_PASSWORD"; exit 1; }
          [ -n "$IOS_PROVISION_PROFILE_B64" ]      || { echo "Missing: IOS_PROVISION_PROFILE_B64"; exit 1; }

      - name: Install distribution certificate
        shell: bash
        env:
          IOS_DISTRIBUTION_CERT_B64: ${{ secrets.IOS_DISTRIBUTION_CERT_B64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          echo "$IOS_DISTRIBUTION_CERT_B64" | base64 --decode > "$CERT_PATH"
          test -s "$CERT_PATH" || { echo "Decoded .p12 is empty"; exit 1; }
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DISTRIBUTION_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Install provisioning profile
        shell: bash
        env:
          IOS_PROVISION_PROFILE_B64: ${{ secrets.IOS_PROVISION_PROFILE_B64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$IOS_PROVISION_PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          test -s "$RUNNER_TEMP/profile.mobileprovision" || { echo "Decoded profile is empty"; exit 1; }
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin \
            <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin \
            <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")")
          cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Install App Store Connect API key
        shell: bash
        env:
          APPSTORE_API_KEY_B64: ${{ secrets.APPSTORE_API_KEY_B64 }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          API_KEY_DIR="$HOME/private_keys"
          mkdir -p "$API_KEY_DIR"
          echo "$APPSTORE_API_KEY_B64" | base64 --decode \
            > "$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          test -s "$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8" || { echo "API key empty"; exit 1; }
          echo "API_KEY_PATH=$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Generate ExportOptions.plist
        shell: bash
        run: |
          python3 -c "
          import plistlib
          pl = {
            'method': 'app-store',
            'signingStyle': 'manual',
            'uploadBitcode': False,
            'uploadSymbols': True,
            'provisioningProfiles': {
              'com.cookster.cooksterapp': 'Cookster_AppStore_New',
            },
            'signingCertificate': 'Apple Distribution',
            'teamID': 'Y3972XUW7F',
          }
          with open('ios/ExportOptions.plist', 'wb') as f:
            plistlib.dump(pl, f)
          "
          cat ios/ExportOptions.plist

      - name: Build iOS (compile without signing)
        run: flutter build ios --release --no-codesign

      # Do not pass signing flags on CLI — they leak to Pods. Runner signing is in project.pbxproj.
      - name: Archive
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            archive

      - name: Export IPA
        shell: bash
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_API_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  upload-testflight:
    name: Upload to TestFlight
    needs: build_ipa
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-${{ needs.build_ipa.outputs.version_name }}-${{ needs.build_ipa.outputs.build_number }}
          path: ipa

      - name: Install App Store Connect API key
        shell: bash
        env:
          APPSTORE_API_KEY_B64: ${{ secrets.APPSTORE_API_KEY_B64 }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          API_KEY_DIR="$HOME/private_keys"
          mkdir -p "$API_KEY_DIR"
          echo "$APPSTORE_API_KEY_B64" | base64 --decode \
            > "$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          echo "API_KEY_PATH=$API_KEY_DIR/AuthKey_${APPSTORE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        shell: bash
        run: |
          IPA_PATH="$(ls ipa/*.ipa | head -n 1)"
          echo "Uploading $IPA_PATH …"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
