name: iOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.6"
  XCODE_VERSION: "latest-stable"

jobs:
  build-and-upload-testflight:
    name: Build IPA and Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and parse release tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$RAW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "Invalid tag format: $RAW_TAG"
            echo "Expected format: vMAJOR.MINOR.PATCH+BUILD (example: v1.0.7+92)"
            exit 1
          fi

          TAG_NO_V="${RAW_TAG#v}"
          VERSION_NAME="${TAG_NO_V%%+*}"
          BUILD_NUMBER="${TAG_NO_V##*+}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION_NAME build $BUILD_NUMBER"

      - name: Update pubspec.yaml version
        run: |
          sed -i '' "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install App Store Connect API key
        shell: bash
        run: |
          API_KEY_DIR="$HOME/private_keys"
          mkdir -p "$API_KEY_DIR"
          echo "${{ secrets.APPSTORE_API_KEY_B64 }}" | base64 --decode \
            > "$API_KEY_DIR/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8"
          echo "API_KEY_PATH=$API_KEY_DIR/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8" >> "$GITHUB_ENV"
          ls -la "$API_KEY_DIR/"

      - name: Generate ExportOptions.plist
        shell: bash
        run: |
          python3 -c "
          import plistlib
          pl = {
            'method': 'app-store',
            'signingStyle': 'automatic',
            'uploadBitcode': False,
            'uploadSymbols': True,
          }
          with open('ios/ExportOptions.plist', 'wb') as f:
            plistlib.dump(pl, f)
          "
          echo "=== ExportOptions.plist ==="
          cat ios/ExportOptions.plist

      - name: Build iOS (compile without signing)
        run: flutter build ios --release --no-codesign

      - name: Archive and export IPA
        shell: bash
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_API_ISSUER_ID"

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_API_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        shell: bash
        run: |
          IPA_PATH="$(ls build/ios/ipa/*.ipa | head -n 1)"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
