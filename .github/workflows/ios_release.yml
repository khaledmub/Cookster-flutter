name: iOS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FLUTTER_VERSION: "3.41.6"
  XCODE_VERSION: "latest-stable"

jobs:
  build-and-upload-testflight:
    name: Build IPA and Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate and parse release tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$RAW_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+[0-9]+$ ]]; then
            echo "Invalid tag format: $RAW_TAG"
            echo "Expected format: vMAJOR.MINOR.PATCH+BUILD (example: v1.0.7+92)"
            exit 1
          fi

          TAG_NO_V="${RAW_TAG#v}"
          VERSION_NAME="${TAG_NO_V%%+*}"
          BUILD_NUMBER="${TAG_NO_V##*+}"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION_NAME build $BUILD_NUMBER"

      - name: Update pubspec.yaml version
        run: |
          sed -i '' "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          grep "^version:" pubspec.yaml

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare signing files
        shell: bash
        run: |
          echo "${{ secrets.IOS_P12_B64 }}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "${{ secrets.APPSTORE_API_KEY_B64 }}" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8"

      - name: Install certificate and provisioning profile
        id: signing
        env:
          KEYCHAIN_PASSWORD: temp_keychain_password
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        shell: bash
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$RUNNER_TEMP/cert.p12" -k build.keychain -P "$P12_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          /usr/bin/security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile_plist.xml" 2>/dev/null
          if [ ! -s "$RUNNER_TEMP/profile_plist.xml" ]; then
            echo "ERROR: Failed to decode provisioning profile"
            exit 1
          fi

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/profile_plist.xml")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$RUNNER_TEMP/profile_plist.xml")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/profile_plist.xml")

          echo "Extracted -> UUID: $PROFILE_UUID | Team: $TEAM_ID | Name: $PROFILE_NAME"

          if [ -z "$PROFILE_UUID" ] || [ -z "$TEAM_ID" ]; then
            echo "ERROR: Failed to extract UUID or Team ID from profile"
            cat "$RUNNER_TEMP/profile_plist.xml"
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/profile.mobileprovision" \
             "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "team_id=$TEAM_ID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

          security find-identity -v -p codesigning build.keychain
          echo "=== Installed profiles ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Force manual signing in Xcode project
        shell: bash
        env:
          TEAM_ID: ${{ steps.signing.outputs.team_id }}
          PROFILE_NAME: ${{ steps.signing.outputs.profile_name }}
          PROFILE_UUID: ${{ steps.signing.outputs.profile_uuid }}
        run: |
          # 1. Patch project.pbxproj: switch from Automatic to Manual signing
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = "Apple Distribution"/g' "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = \"\"/DEVELOPMENT_TEAM = \"${TEAM_ID}\"/g" "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = ${TEAM_ID};/g" "$PBXPROJ"

          # 2. Inject signing overrides into Release.xcconfig
          {
            echo ""
            echo "CODE_SIGN_STYLE=Manual"
            echo "CODE_SIGN_IDENTITY=Apple Distribution"
            echo "DEVELOPMENT_TEAM=${TEAM_ID}"
            echo "PROVISIONING_PROFILE_SPECIFIER=${PROFILE_NAME}"
            echo "PROVISIONING_PROFILE=${PROFILE_UUID}"
          } >> ios/Flutter/Release.xcconfig

          # 3. Generate ExportOptions.plist (no leading whitespace)
          cat > ios/ExportOptions.plist << PLISTEOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store</string>
  <key>teamID</key>
  <string>${TEAM_ID}</string>
  <key>signingStyle</key>
  <string>manual</string>
  <key>provisioningProfiles</key>
  <dict>
    <key>com.cookster.cooksterapp</key>
    <string>${PROFILE_NAME}</string>
  </dict>
  <key>uploadBitcode</key>
  <false/>
  <key>uploadSymbols</key>
  <true/>
</dict>
</plist>
PLISTEOF

          echo "=== Release.xcconfig ==="
          cat ios/Flutter/Release.xcconfig
          echo "=== ExportOptions.plist ==="
          cat ios/ExportOptions.plist
          echo "=== project.pbxproj signing lines ==="
          grep -i "provisioning\|CODE_SIGN\|DEVELOPMENT_TEAM\|ProvisioningStyle" "$PBXPROJ" | head -30

      - name: Build iOS IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        shell: bash
        run: |
          IPA_PATH="$(ls build/ios/ipa/*.ipa | head -n 1)"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
